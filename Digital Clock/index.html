<!DOCTYPE html>
<html>
    <head>
        <title>Digital Clock</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSwZLR4H2R1gddaRpjeRj8X7E-6Upev8iZqYw&s">
        <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="dig">
        <h1 style="text-align:center;  font-size:2rem;"> Digital Clock</h1>
        <div class="clock">
            <div class="time">
            <center>
            <span id="hour">00</span>
            <p>Hours</p>
            </center>
            </div>
            <div class="colon">
            <span>:</span>
            </div>
            <div class="time">
            <center>
            <span id="minute">00</span>
            <p>Minutes</p>
            </center>
            </div>
            <div class="colon">
            <span>:</span>
            </div>
            <div class="time">
            <center>
            <span id="second">00</span>
            <p>Seconds</p>
            </center>
            </div>
            <div class="period">
            <center>
            <span id="period">AM</span>
            <p id="dates">Period</p>
            </center>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
