<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Dice Roller</h1>

        <label for="inp">Number of Dice:</label>
        <input type="number" id="inp" min="1" value="1">

        <br><br>

        <button onclick="roll()" class="btn">
            Roll Dice
        </button>

        <div id="dice"></div>
        <div id="diceImg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
